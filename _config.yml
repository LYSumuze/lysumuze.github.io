# ---------------- #
#   Main Configs   #
# ---------------- #
baseurl:
url: https://www.sumuze.cn
date_format: "ordinal"
title: 陆也
subtitle: "锦瑟无端五十弦，一弦一柱思华年"
description: "陆也的个人博客"
keywords: 陆也, Lu Ye, LYSumuze, Sumuze
timezone: Asia/Shanghai
encoding: "utf-8"
side_bar_repo_limit: 5

# ---------------- #
#      Author      #
# ---------------- #
author: Lu Ye
organization: sumuze.cn
organization_url: https://www.sumuze.cn
github_username: LYSumuze
location: Changchun, China
email: 17649851569@163.com

# ---------------- #
#    Navigation    #
# ---------------- #
navs:
  -
    href: /
    label: 首页

  -
    href: /categories/
    label: 分类

#   -
#     href: /archives/
